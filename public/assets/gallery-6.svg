<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <rect width="1200" height="600" fill="#111111"/>
  <rect x="1" y="1" width="1198" height="598" fill="none" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Wide street shot — two bikes -->

  <!-- Bike 1 -->
  <circle cx="360" cy="420" r="120" fill="none" stroke="#222" stroke-width="10"/>
  <circle cx="360" cy="420" r="12" fill="#222"/>
  <circle cx="560" cy="420" r="120" fill="none" stroke="#222" stroke-width="10"/>
  <circle cx="560" cy="420" r="12" fill="#222"/>
  <polygon points="360,420 460,260 510,420" fill="none" stroke="#252525" stroke-width="9" stroke-linejoin="round"/>
  <line x1="460" y1="260" x2="560" y2="420" stroke="#252525" stroke-width="9"/>
  <line x1="460" y1="260" x2="520" y2="245" stroke="#252525" stroke-width="8"/>
  <line x1="520" y1="245" x2="560" y2="420" stroke="#252525" stroke-width="8"/>
  <circle cx="460" cy="420" r="22" fill="none" stroke="#E8FF00" stroke-width="3" opacity="0.3"/>

  <!-- Bike 2 -->
  <circle cx="640" cy="420" r="120" fill="none" stroke="#222" stroke-width="10"/>
  <circle cx="640" cy="420" r="12" fill="#222"/>
  <circle cx="840" cy="420" r="120" fill="none" stroke="#222" stroke-width="10"/>
  <circle cx="840" cy="420" r="12" fill="#222"/>
  <polygon points="640,420 740,255 795,420" fill="none" stroke="#252525" stroke-width="9" stroke-linejoin="round"/>
  <line x1="740" y1="255" x2="840" y2="420" stroke="#252525" stroke-width="9"/>
  <line x1="740" y1="255" x2="800" y2="240" stroke="#252525" stroke-width="8"/>
  <line x1="800" y1="240" x2="840" y2="420" stroke="#252525" stroke-width="8"/>
  <circle cx="740" cy="420" r="22" fill="none" stroke="#FF4D00" stroke-width="3" opacity="0.3"/>

  <!-- Ground -->
  <rect x="0" y="540" width="1200" height="60" fill="#0A0A0A"/>
  <rect x="0" y="535" width="1200" height="5" fill="#161616"/>

  <!-- SPINZ wordmark -->
  <text x="600" y="150" font-family="sans-serif" font-size="72" font-weight="900" fill="#1C1C1C" text-anchor="middle" letter-spacing="20">SPINZ</text>

  <text x="600" y="582" font-family="monospace" font-size="11" fill="#2A2A2A" text-anchor="middle" letter-spacing="3">GALLERY 06</text>
</svg>
