<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#161616"/>
  <rect x="1" y="1" width="1198" height="798" fill="none" stroke="#2A2A2A" stroke-width="2"/>

  <!-- Wheel back -->
  <circle cx="380" cy="530" r="180" fill="none" stroke="#2A2A2A" stroke-width="16"/>
  <circle cx="380" cy="530" r="18" fill="#2A2A2A"/>
  <!-- Spokes back -->
  <line x1="380" y1="350" x2="380" y2="710" stroke="#222" stroke-width="3"/>
  <line x1="200" y1="530" x2="560" y2="530" stroke="#222" stroke-width="3"/>
  <line x1="253" y1="403" x2="507" y2="657" stroke="#222" stroke-width="3"/>
  <line x1="507" y1="403" x2="253" y2="657" stroke="#222" stroke-width="3"/>

  <!-- Wheel front -->
  <circle cx="820" cy="530" r="180" fill="none" stroke="#2A2A2A" stroke-width="16"/>
  <circle cx="820" cy="530" r="18" fill="#2A2A2A"/>
  <!-- Spokes front -->
  <line x1="820" y1="350" x2="820" y2="710" stroke="#222" stroke-width="3"/>
  <line x1="640" y1="530" x2="1000" y2="530" stroke="#222" stroke-width="3"/>
  <line x1="693" y1="403" x2="947" y2="657" stroke="#222" stroke-width="3"/>
  <line x1="947" y1="403" x2="693" y2="657" stroke="#222" stroke-width="3"/>

  <!-- Frame -->
  <polygon points="380,530 540,280 700,530" fill="none" stroke="#333" stroke-width="14" stroke-linejoin="round"/>
  <line x1="540" y1="280" x2="820" y2="530" stroke="#333" stroke-width="14"/>
  <line x1="700" y1="530" x2="820" y2="530" stroke="#333" stroke-width="14"/>
  <!-- Seat stay -->
  <line x1="540" y1="280" x2="380" y2="530" stroke="#333" stroke-width="10"/>
  <!-- Top tube -->
  <line x1="540" y1="280" x2="700" y2="260" stroke="#333" stroke-width="12"/>
  <!-- Fork -->
  <line x1="700" y1="260" x2="820" y2="530" stroke="#333" stroke-width="12"/>

  <!-- Handlebar -->
  <line x1="700" y1="260" x2="720" y2="220" stroke="#444" stroke-width="10"/>
  <line x1="700" y1="220" x2="745" y2="220" stroke="#444" stroke-width="8"/>

  <!-- Seat post -->
  <line x1="540" y1="280" x2="530" y2="230" stroke="#444" stroke-width="10"/>
  <ellipse cx="516" cy="228" rx="30" ry="8" fill="#444"/>

  <!-- Chainring -->
  <circle cx="540" cy="530" r="36" fill="none" stroke="#E8FF00" stroke-width="4" opacity="0.5"/>
  <circle cx="540" cy="530" r="10" fill="#E8FF00" opacity="0.5"/>

  <!-- Label -->
  <text x="600" y="730" font-family="monospace" font-size="13" fill="#2A2A2A" text-anchor="middle" letter-spacing="4">REPLACE WITH HERO IMAGE</text>
</svg>
