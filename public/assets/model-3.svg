  <circle cx="240" cy="390" r="118" fill="none" stroke="#111" stroke-width="6"/>
  <circle cx="240" cy="390" r="14" fill="#2A2A2A"/>
  <line x1="240" y1="276" x2="240" y2="504" stroke="#1E1E1E" stroke-width="3"/>
  <line x1="126" y1="390" x2="354" y2="390" stroke="#1E1E1E" stroke-width="3"/>
  <line x1="159" y1="309" x2="321" y2="471" stroke="#1E1E1E" stroke-width="3"/>
  <line x1="321" y1="309" x2="159" y2="471" stroke="#1E1E1E" stroke-width="3"/>

  <!-- Wheel front — deep V -->
  <circle cx="560" cy="390" r="140" fill="none" stroke="#2A2A2A" stroke-width="22"/>
  <circle cx="560" cy="390" r="118" fill="none" stroke="#111" stroke-width="6"/>
