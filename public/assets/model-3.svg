  <line x1="560" y1="276" x2="560" y2="504" stroke="#1E1E1E" stroke-width="3"/>
  <line x1="446" y1="390" x2="674" y2="390" stroke="#1E1E1E" stroke-width="3"/>
  <line x1="479" y1="309" x2="641" y2="471" stroke="#1E1E1E" stroke-width="3"/>
  <line x1="641" y1="309" x2="479" y2="471" stroke="#1E1E1E" stroke-width="3"/>

  <!-- Frame — track geometry -->
  <polygon points="240,390 375,185 495,390" fill="none" stroke="#2A2A2A" stroke-width="11" stroke-linejoin="round"/>
  <line x1="375" y1="185" x2="560" y2="390" stroke="#2A2A2A" stroke-width="11"/>
  <line x1="375" y1="185" x2="505" y2="168" stroke="#2A2A2A" stroke-width="9"/>
  <line x1="505" y1="168" x2="560" y2="390" stroke="#2A2A2A" stroke-width="9"/>
  <!-- Drop bars -->
  <line x1="505" y1="168" x2="520" y2="135" stroke="#333" stroke-width="8"/>
  <path d="M500,135 Q520,120 540,135" fill="none" stroke="#333" stroke-width="7"/>
  <line x1="375" y1="185" x2="366" y2="148" stroke="#333" stroke-width="8"/>
  <ellipse cx="353" cy="146" rx="22" ry="6" fill="#333"/>

