  <circle cx="375" cy="390" r="30" fill="none" stroke="#E8FF00" stroke-width="4" opacity="0.5"/>
  <circle cx="375" cy="390" r="10" fill="none" stroke="#E8FF00" stroke-width="2" opacity="0.3"/>

  <text x="400" y="555" font-family="monospace" font-size="11" fill="#2A2A2A" text-anchor="middle" letter-spacing="3">TRACK R — PLACEHOLDER</text>
