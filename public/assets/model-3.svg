<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#111111"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="#2A2A2A" stroke-width="2"/>

