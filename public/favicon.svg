<svg viewBox="0 0 32 32" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="6" fill="#1C1C1C"/>
  <!-- Wheels -->
  <circle cx="8" cy="22" r="5" stroke="#C9A870" stroke-width="1.5" fill="none"/>
  <circle cx="24" cy="22" r="5" stroke="#C9A870" stroke-width="1.5" fill="none"/>
  <!-- Rear frame: seat tube + chain stay -->
  <line x1="8" y1="22" x2="14" y2="12" stroke="#C9A870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="16" y2="18" stroke="#C9A870" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Front fork -->
  <line x1="24" y1="22" x2="20" y2="12" stroke="#C9A870" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top tube + down tube -->
  <line x1="14" y1="12" x2="20" y2="12" stroke="#C9A870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="12" x2="16" y2="18" stroke="#C9A870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="12" x2="16" y2="18" stroke="#C9A870" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Saddle -->
  <line x1="12" y1="11" x2="16" y2="11" stroke="#C9A870" stroke-width="2" stroke-linecap="round"/>
  <!-- Handlebar -->
  <line x1="20" y1="12" x2="22" y2="10" stroke="#C9A870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="9.5" x2="23" y2="10.5" stroke="#C9A870" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crank -->
  <circle cx="16" cy="18" r="1.5" stroke="#C9A870" stroke-width="1" fill="none"/>
</svg>
